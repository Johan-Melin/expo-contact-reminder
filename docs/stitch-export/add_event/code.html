<body class="font-body-md text-on-surface">
<!-- Header / Top Bar (Manual Suppression of Nav Shell for Transactional Flow) -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-container-padding h-16 max-w-[600px] mx-auto bg-surface-bright">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
<div class="flex-1 text-center">
<h1 class="font-headline-md text-headline-md text-primary-container">Record a Connection</h1>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>

<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">search</span>
</div>
<input class="w-full h-[56px] pl-12 pr-4 bg-white border border-outline-variant rounded-xl shadow-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all text-body-md outline-none" placeholder="Search contacts..." type="text"/>
</div>
<!-- Quick Select Horizontal Scroll -->
<div class="flex gap-md overflow-x-auto py-xs custom-scrollbar">
<div class="flex flex-col items-center gap-xs min-w-[72px] active:scale-95 transition-transform">

</div>

</div>
<div class="flex flex-col items-center gap-xs min-w-[72px] active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-full border-2 border-transparent p-0.5 bg-surface-container">

</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">David K.</span>
</div>
<div class="flex flex-col items-center gap-xs min-w-[72px] active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-full border-2 border-transparent p-0.5 bg-surface-container">
<img class="w-full h-full rounded-full object-cover" data-alt="Close up portrait of a vibrant woman in a bright, modern setting. The visual style is tactile and clean, emphasizing a personal and approachable feel. The lighting is soft and consistent with a high-end social maintenance app designed for busy individuals." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAC_GX_FnLsKifECM4PwOMoAVDX1aa9RZIusgFe25z_p_06_2UIHwzxsrdqtj3qGZE47so7d9mS_9EkmOrCFJAm0OayLkfcmlBjqIK_t4NZ9y69qWQLG9ZuooU2_z_OchnwfO7F_LbdmEqL4XXJjEuwozOld_sfRcK0L_7szashgz1iJTn3BLNyvI1eb0GdDXR66y2M1Sp4qzAM_uIsRzqMHS5LSibB1WcRTHMNlzYqHiXeWl9hWTek05OidIYSjLmF76gpdoc6x30"/>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Elena M.</span>
</div>
<div class="flex flex-col items-center gap-xs min-w-[72px] active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-full border-2 border-transparent p-0.5 bg-surface-container">

</div>

</div>
</div>
</section>
<!-- Date Picker Section -->
<section class="space-y-sm">
<label class="block font-label-md text-label-md text-primary-container ml-unit">When did it happen?</label>
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">calendar_today</span>
</div>
<input class="w-full h-[56px] pl-12 pr-4 bg-white border border-outline-variant rounded-xl shadow-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all text-body-md outline-none appearance-none" type="date" value="2023-10-27"/>
</div>
</section>
<!-- Event Type Section -->
<section class="space-y-sm">
<label class="block font-label-md text-label-md text-primary-container ml-unit">Connection Type</label>
<div class="grid grid-cols-2 gap-sm">
<button class="flex items-center gap-sm p-4 bg-primary text-white rounded-xl shadow-md transition-all active:scale-95" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">phone_in_talk</span>
<span class="font-label-md text-label-md">Phone Call</span>
</button>
<button class="flex items-center gap-sm p-4 bg-white border border-outline-variant text-on-surface-variant rounded-xl hover:bg-surface-container transition-all active:scale-95" type="button">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="font-label-md text-label-md">Message</span>
</button>
<button class="flex items-center gap-sm p-4 bg-white border border-outline-variant text-on-surface-variant rounded-xl hover:bg-surface-container transition-all active:scale-95" type="button">

</button>
<button class="flex items-center gap-sm p-4 bg-white border border-outline-variant text-on-surface-variant rounded-xl hover:bg-surface-container transition-all active:scale-95" type="button">
<span class="material-symbols-outlined">videocam</span>
<span class="font-label-md text-label-md">Video Call</span>
</button>
</div>
</section>
<!-- Notes Section -->
<section class="space-y-sm">
<label class="block font-label-md text-label-md text-primary-container ml-unit">Memories &amp; Notes</label>
<textarea class="w-full p-4 bg-white border border-outline-variant rounded-xl shadow-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all text-body-md outline-none resize-none placeholder:text-outline" placeholder="What did you talk about? Any highlights or future things to follow up on?" rows="4"></textarea>
</section>
</form>
</main>
<!-- Bottom Action Area -->
<footer class="fixed bottom-0 left-0 w-full p-container-padding bg-surface-bright/80 backdrop-blur-lg max-w-[600px] mx-auto">
<button class="w-full h-14 bg-primary text-white font-headline-md rounded-2xl shadow-[0_4px_12px_rgba(45,106,79,0.2)] active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">eco</span>
            Log Event
        </button>
<div class="h-safe pb-xs"></div>
</footer>
</body></html>
